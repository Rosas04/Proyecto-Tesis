services:
  # 1. Backend (FastAPI + Playwright usando Docker)
  - type: web
    name: frontmind-backend
    runtime: docker
    dockerfilePath: frontmind-agents/Dockerfile
    dockerContext: frontmind-agents
    plan: free # El plan free sí es válido para Web Services en Docker

  # 2. Frontend (Vite + React como Sitio Estático)
  - type: web
    name: frontmind-frontend
    runtime: static
    rootDir: Front
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # NO ponemos 'plan: free' aquí, ya que los sitios estáticos son gratis por defecto en Render
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: frontmind-backend
          property: host
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
